[profile.default]
src = "contracts/contracts"
out = "contracts/out"
libs = ["lib"]
script = "contracts/script"
test = "contracts/test"
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]
